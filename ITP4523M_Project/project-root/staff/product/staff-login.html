<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Living · Staff Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D3748',
                        secondary: '#8B5A2B',
                        success: '#38A169',
                        danger: '#E53E3E',
                    },
                }
            }
        }
    </script>
    <style>
        .btn-primary {
            @apply bg-secondary text-white px-6 py-3 rounded-lg hover:bg-secondary/90 transition-all font-medium;
        }
    </style>
</head>
<body class="bg-gray-900 font-sans min-h-screen flex items-center justify-center p-4"
      style="background-image: linear-gradient(135deg, #2D3748 0%, #1a202c 100%);">

<div class="max-w-md w-full">
    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center gap-2 text-3xl font-bold text-white">
            <i class="fas fa-couch text-secondary"></i>
            <span>Premium Living</span>
        </div>
        <p class="text-gray-400 mt-2">Staff Management Portal</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white/10 backdrop-blur-lg rounded-2xl shadow-2xl overflow-hidden border border-gray-700">
        <div class="p-8">
            <h2 class="text-2xl font-bold text-white mb-6">Staff Login</h2>

            <!-- Login Form -->
            <form class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Employee ID</label>
                    <input type="text" placeholder="EMP-12345"
                           class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-lg text-white focus:ring-2 focus:ring-secondary/50 focus:border-secondary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" placeholder="••••••••"
                               class="w-full px-4 py-3 bg-gray-800/50 border border-gray-700 rounded-lg text-white focus:ring-2 focus:ring-secondary/50 focus:border-secondary">
                        <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-secondary">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center gap-2 text-gray-300">
                        <input type="checkbox" class="rounded bg-gray-700 border-gray-600"> Remember me
                    </label>
                    <a href="#" class="text-secondary hover:underline">Forgot password?</a>
                </div>

                <a href="staff-dashboard.html" class="btn-primary w-full block text-center">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login to Dashboard
                </a>
            </form>

            <!-- Security Notice -->
            <div class="mt-6 pt-4 border-t border-gray-700">
                <p class="text-xs text-gray-500 text-center">
                    <i class="fas fa-shield-alt mr-1"></i>
                    Authorised personnel only. All access is logged.
                </p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
