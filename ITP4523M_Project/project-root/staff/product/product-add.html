<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Living · Add Product</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D3748',
                        secondary: '#8B5A2B',
                        success: '#38A169',
                        danger: '#E53E3E',
                    },
                }
            }
        }
    </script>
    <style>
        .menu-item {
            @apply flex items-center gap-3 px-4 py-3 rounded-lg hover:bg-gray-100 transition-all;
        }
        .form-section {
            @apply bg-white rounded-lg shadow-lg p-6;
        }
        .form-input {
            @apply w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50 focus:border-secondary;
        }
        .btn-primary {
            @apply bg-secondary text-white px-6 py-2 rounded-lg hover:bg-secondary/90 transition-all;
        }
        .btn-secondary {
            @apply border border-gray-300 px-6 py-2 rounded-lg hover:bg-gray-100 transition-all;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-primary">
<!-- Top Navigation -->
<nav class="bg-primary text-white shadow-md sticky top-0 z-50">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center gap-2">
                <i class="fas fa-couch text-2xl text-secondary"></i>
                <span class="font-bold text-xl">Staff Portal</span>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-secondary rounded-full flex items-center justify-center text-white font-bold">
                        JD
                    </div>
                    <span class="hidden md:inline">John Doe</span>
                </div>
            </div>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mx-auto px-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-8">
        <!-- Sidebar Menu -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-lg shadow-lg p-4 sticky top-20">
                <nav class="space-y-1">
                    <a href="staff-dashboard.html" class="menu-item">
                        <i class="fas fa-tachometer-alt w-5"></i> Dashboard
                    </a>
                    <a href="product-catalog.html" class="menu-item">
                        <i class="fas fa-box w-5"></i> Product Catalog
                    </a>
                    <a href="product-add.html" class="menu-item active">
                        <i class="fas fa-plus-circle w-5"></i> Add Product
                    </a>
                    <a href="product-category.html" class="menu-item">
                        <i class="fas fa-tags w-5"></i> Categories
                    </a>
                    <a href="product-pricing.html" class="menu-item">
                        <i class="fas fa-dollar-sign w-5"></i> Pricing
                    </a>
                    <a href="product-images.html" class="menu-item">
                        <i class="fas fa-images w-5"></i> Product Images
                    </a>
                </nav>
            </div>
        </div>

        <!-- Add Product Form -->
        <div class="lg:col-span-4">
            <div class="form-section">
                <h1 class="text-2xl font-bold mb-6">Add New Product</h1>

                <form class="space-y-6">
                    <!-- Basic Information -->
                    <div>
                        <h2 class="text-lg font-bold mb-4 pb-2 border-b border-gray-200">Basic Information</h2>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Product Name *</label>
                                <input type="text" class="form-input" placeholder="e.g., Harmony 3-Seater Sofa">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">SKU *</label>
                                <input type="text" class="form-input" placeholder="e.g., SKU-001234">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Category *</label>
                                <select class="form-input">
                                    <option>Select Category</option>
                                    <option>Living Room</option>
                                    <option>Bedroom</option>
                                    <option>Dining Room</option>
                                    <option>Office</option>
                                    <option>Lighting</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Subcategory</label>
                                <select class="form-input">
                                    <option>Select Subcategory</option>
                                    <option>Sofas</option>
                                    <option>Tables</option>
                                    <option>Chairs</option>
                                    <option>Storage</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Pricing -->
                    <div>
                        <h2 class="text-lg font-bold mb-4 pb-2 border-b border-gray-200">Pricing</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Base Price *</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">$</span>
                                    <input type="number" class="form-input pl-8" placeholder="0.00">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Sale Price</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">$</span>
                                    <input type="number" class="form-input pl-8" placeholder="0.00">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Cost Price</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">$</span>
                                    <input type="number" class="form-input pl-8" placeholder="0.00">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Inventory -->
                    <div>
                        <h2 class="text-lg font-bold mb-4 pb-2 border-b border-gray-200">Inventory</h2>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Stock Quantity *</label>
                                <input type="number" class="form-input" placeholder="0">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Low Stock Threshold</label>
                                <input type="number" class="form-input" placeholder="10">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Location</label>
                                <input type="text" class="form-input" placeholder="e.g., Warehouse A">
                            </div>
                        </div>
                    </div>

                    <!-- Product Details -->
                    <div>
                        <h2 class="text-lg font-bold mb-4 pb-2 border-b border-gray-200">Product Details</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Short Description</label>
                                <textarea rows="2" class="form-input" placeholder="Brief product description..."></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Full Description</label>
                                <textarea rows="4" class="form-input" placeholder="Detailed product description..."></textarea>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1">Dimensions</label>
                                    <input type="text" class="form-input" placeholder="e.g., 85 x 35 x 33 inches">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">Weight</label>
                                    <input type="text" class="form-input" placeholder="e.g., 45 lbs">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">Material</label>
                                    <input type="text" class="form-input" placeholder="e.g., Oak Wood, Fabric">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">Color Options</label>
                                    <input type="text" class="form-input" placeholder="e.g., Charcoal Grey, Beige">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- SEO -->
                    <div>
                        <h2 class="text-lg font-bold mb-4 pb-2 border-b border-gray-200">SEO Information</h2>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Meta Title</label>
                                <input type="text" class="form-input" placeholder="SEO title">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Meta Description</label>
                                <textarea rows="2" class="form-input" placeholder="SEO description..."></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Keywords</label>
                                <input type="text" class="form-input" placeholder="sofa, living room, furniture">
                            </div>
                        </div>
                    </div>

                    <!-- Status -->
                    <div>
                        <h2 class="text-lg font-bold mb-4 pb-2 border-b border-gray-200">Status</h2>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2">
                                <input type="radio" name="status" class="text-secondary" checked>
                                <span>Active</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="radio" name="status" class="text-secondary">
                                <span>Inactive</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="radio" name="status" class="text-secondary">
                                <span>Pre-order</span>
                            </label>
                        </div>
                    </div>

                    <!-- Form Actions -->
                    <div class="flex gap-3 pt-4">
                        <button type="submit" class="btn-primary">Create Product</button>
                        <button type="reset" class="btn-secondary">Reset</button>
                        <a href="product-catalog.html" class="btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
