<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Living · Cancellation Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D3748',
                        secondary: '#8B5A2B',
                        success: '#38A169',
                        warning: '#ECC94B',
                    },
                }
            }
        }
    </script>
    <style>
        .rating-star {
            @apply text-gray-300 hover:text-yellow-400 cursor-pointer text-2xl;
        }
        .rating-star.active {
            @apply text-yellow-400;
        }
        .btn-primary {
            @apply bg-secondary text-white px-6 py-3 rounded-lg hover:bg-secondary/90 transition-all;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-primary min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full">
        <!-- Feedback Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Header -->
            <div class="bg-secondary/10 p-6 text-center border-b border-secondary/20">
                <div class="w-20 h-20 bg-secondary rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-comment-dots text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold mb-2">We're Sorry to See You Go</h1>
                <p class="text-gray-600">Your feedback helps us improve our service</p>
            </div>

            <!-- Content -->
            <div class="p-8">
                <!-- Cancellation Reference -->
                <div class="bg-gray-50 rounded-lg p-4 mb-6 text-center">
                    <p class="text-sm text-gray-500">Cancellation Request</p>
                    <p class="font-bold text-lg">#CNCL-2026-001234</p>
                </div>

                <!-- Rating Section -->
                <div class="text-center mb-6">
                    <h2 class="font-bold text-lg mb-3">How would you rate your cancellation experience?</h2>
                    <div class="flex justify-center gap-2 mb-2">
                        <i class="rating-star fas fa-star" data-rating="1"></i>
                        <i class="rating-star fas fa-star" data-rating="2"></i>
                        <i class="rating-star fas fa-star" data-rating="3"></i>
                        <i class="rating-star fas fa-star" data-rating="4"></i>
                        <i class="rating-star fas fa-star" data-rating="5"></i>
                    </div>
                    <p class="text-sm text-gray-500">Click a star to rate</p>
                </div>

                <!-- Feedback Form -->
                <form class="space-y-4">
                    <!-- Reason for Cancellation -->
                    <div>
                        <label class="block font-medium mb-2">Primary reason for cancellation *</label>
                        <select class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50" required>
                            <option value="">Select a reason</option>
                            <option>Found better price elsewhere</option>
                            <option>Delivery time too long</option>
                            <option>Ordered by mistake</option>
                            <option>Product quality concerns</option>
                            <option>Customer service experience</option>
                            <option>Website/app issues</option>
                            <option>Financial reasons</option>
                            <option>Other</option>
                        </select>
                    </div>

                    <!-- Detailed Feedback -->
                    <div>
                        <label class="block font-medium mb-2">Tell us more (optional)</label>
                        <textarea rows="4" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50" 
                                  placeholder="Please share any additional feedback about your cancellation experience..."></textarea>
                    </div>

                    <!-- What could we improve? -->
                    <div>
                        <label class="block font-medium mb-2">What could we do better?</label>
                        <div class="space-y-2">
                            <label class="flex items-center gap-2">
                                <input type="checkbox" class="rounded text-secondary">
                                <span>Faster cancellation process</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" class="rounded text-secondary">
                                <span>More flexible cancellation policy</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" class="rounded text-secondary">
                                <span>Better communication</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" class="rounded text-secondary">
                                <span>Easier cancellation process</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="checkbox" class="rounded text-secondary">
                                <span>More cancellation options</span>
                            </label>
                        </div>
                    </div>

                    <!-- Would you recommend? -->
                    <div>
                        <label class="block font-medium mb-2">Would you recommend Premium Living to others?</label>
                        <div class="flex gap-4">
                            <label class="flex items-center gap-2">
                                <input type="radio" name="recommend" class="text-secondary">
                                <span>Yes</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="radio" name="recommend" class="text-secondary">
                                <span>No</span>
                            </label>
                            <label class="flex items-center gap-2">
                                <input type="radio" name="recommend" class="text-secondary">
                                <span>Maybe</span>
                            </label>
                        </div>
                    </div>

                    <!-- Future Contact -->
                    <div>
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="rounded text-secondary">
                            <span>I'm willing to be contacted about my feedback</span>
                        </label>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex gap-3 pt-4">
                        <button type="submit" class="btn-primary flex-1">Submit Feedback</button>
                        <a href="cancel-history.html" class="flex-1 border border-gray-300 px-6 py-3 rounded-lg hover:bg-gray-100 text-center">
                            Skip
                        </a>
                    </div>
                </form>

                <!-- Thank You Message -->
                <div class="text-center mt-6 text-sm text-gray-500">
                    <i class="fas fa-heart text-secondary mr-1"></i>
                    Thank you for helping us improve
                </div>
            </div>
        </div>

        <!-- Return Link -->
        <div class="text-center mt-6">
            <a href="../../../index.html" class="text-gray-500 hover:text-secondary">
                <i class="fas fa-home mr-1"></i> Return to Homepage
            </a>
        </div>
    </div>

    <script>
        // Star rating functionality
        const stars = document.querySelectorAll('.rating-star');
        stars.forEach(star => {
            star.addEventListener('click', function() {
                const rating = this.dataset.rating;
                stars.forEach(s => {
                    s.classList.remove('active');
                    if (s.dataset.rating <= rating) {
                        s.classList.add('active');
                    }
                });
            });
        });
    </script>
</body>
</html>
