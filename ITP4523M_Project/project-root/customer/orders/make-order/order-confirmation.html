<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Living · Order Confirmation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D3748',
                        secondary: '#8B5A2B',
                        success: '#38A169',
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="max-w-2xl w-full">
        <!-- Confirmation Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Success Header -->
            <div class="bg-success/10 p-8 text-center border-b border-success/20">
                <div class="w-20 h-20 bg-success rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-check text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl font-bold text-primary mb-2">Order Confirmed!</h1>
                <p class="text-gray-600">Thank you for your purchase</p>
            </div>

            <!-- Order Info -->
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <div>
                        <p class="text-sm text-gray-500">Order Number</p>
                        <p class="text-xl font-bold">ORD-2026-001234</p>
                    </div>
                    <div>
                        <p class="text-sm text-gray-500">Order Date</p>
                        <p class="font-medium">March 15, 2026</p>
                    </div>
                </div>

                <!-- Items Summary -->
                <div class="border-t border-b border-gray-200 py-4 mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-medium">Harmony 3-Seater Sofa</span>
                        <span>$899</span>
                    </div>
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-medium">Modern Coffee Table</span>
                        <span>$249</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-medium">Arc Floor Lamp (2)</span>
                        <span>$258</span>
                    </div>
                </div>

                <!-- Total -->
                <div class="flex justify-between items-center text-lg font-bold mb-6">
                    <span>Total Paid</span>
                    <span class="text-secondary">$1,406.00</span>
                </div>

                <!-- Action Buttons -->
                <div class="flex flex-col sm:flex-row gap-4">
                    <a href="../view-records/order-details.html" class="flex-1 btn-primary bg-secondary text-white px-6 py-3 rounded-lg hover:bg-secondary/90 text-center">
                        View Order Details
                    </a>
                    <a href="../../../index.html" class="flex-1 border border-gray-300 px-6 py-3 rounded-lg hover:bg-gray-100 text-center">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
