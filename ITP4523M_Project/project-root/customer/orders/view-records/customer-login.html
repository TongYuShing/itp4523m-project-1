<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Living · Customer Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2D3748',
                        secondary: '#8B5A2B',
                        success: '#38A169',
                        danger: '#E53E3E',
                    },
                }
            }
        }
    </script>
    <style>
        .btn-primary {
            @apply bg-secondary text-white px-6 py-3 rounded-lg hover:bg-secondary/90 transition-all font-medium;
        }
        .social-login-btn {
            @apply flex-1 border border-gray-300 rounded-lg py-2 hover:bg-gray-50 transition-all flex items-center justify-center gap-2;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 text-3xl font-bold text-primary">
                <i class="fas fa-couch text-secondary"></i>
                <span>Premium Living</span>
            </div>
            <p class="text-gray-500 mt-2">Sign in to your account</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-8">
                <!-- Login Form -->
                <form class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" placeholder="john.doe@example.com" 
                               class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50 focus:border-secondary">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <div class="relative">
                            <input type="password" placeholder="••••••••" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary/50 focus:border-secondary">
                            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-secondary">
                                <i class="far fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-sm">
                        <label class="flex items-center gap-2">
                            <input type="checkbox" class="rounded text-secondary"> Remember me
                        </label>
                        <a href="#" class="text-secondary hover:underline">Forgot password?</a>
                    </div>

                    <a href="customer-dashboard.html" class="btn-primary w-full block text-center">
                        Sign In
                    </a>
                </form>

                <!-- Social Login -->
                <div class="relative my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-gray-300"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-white text-gray-500">Or continue with</span>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button class="social-login-btn">
                        <i class="fab fa-google text-red-500"></i> Google
                    </button>
                    <button class="social-login-btn">
                        <i class="fab fa-facebook text-blue-600"></i> Facebook
                    </button>
                </div>

                <!-- Register Link -->
                <p class="text-center text-sm text-gray-600 mt-6">
                    Don't have an account? 
                    <a href="#" class="text-secondary font-medium hover:underline">Register here</a>
                </p>
            </div>
        </div>

        <!-- Guest Checkout -->
        <div class="text-center mt-6">
            <a href="../../../index.html" class="text-gray-500 hover:text-secondary text-sm">
                <i class="fas fa-arrow-left mr-1"></i> Continue as Guest
            </a>
        </div>
    </div>
</body>
</html>
